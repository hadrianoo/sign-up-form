<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="left-wrapper">
            <div class="logo-wrapper">
                <img src="images/logo.png" alt="TOP project logo">
                <div>ODIN</div>
            </div>
            <div>
                Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a
                    href="https://unsplash.com/">Unsplash</a>
            </div>
        </div>
        <div class="right-wrapper">
            <div class="first-row">
                <p>
                    This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.
                </p>
                <p>Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <form action="/" method="get">
                <div class="col one">
                    <legend>Let's do this!</legend>
                    <label for="first">first name</label>
                    <input type="text" id="first" name="first-name" maxlength="20">
                    <label for="email">email</label>
                    <input type="email" id="email" name="email" maxlength="20">
                    <label for="password">password</label>
                    <input type="password" id="password" name="password" required maxlength="20">
                </div>
                <div class="col two">
                    <label for="last">last name</label>
                    <input type="text" id="last" name="last-name" maxlength="20">
                    <label for="phone">phone number</label>
                    <input type="tel" id="phone" name="phone" minlength="9" maxlength="12">
                    <label for="confirm-password">confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required maxlength="20">
                </div>
                <button type="submit" value="sign-up">Create Account</button>
            </form>
            <div class="third-row">
                <p>
                    Already have an account? <a href="">Log in</a>
                </p>
            </div>
        </div>
    </div>

</body>

</html>
