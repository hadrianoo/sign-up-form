<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="container-logo">
            <div class="logo">
            </div>
        </div>
        <div class="container-form">
            <div class="header">
                <p>
                    This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.
                </p>
                <p>Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <form action="" method="get">
                <div class="col one">
                    <legend>Let's do this!</legend>
                    <label for="first">first name</label>
                    <input type="text" id="first" name="first-name">
                    <label for="email">email</label>
                    <input type="email" id="email" name="email">
                    <label for="password">password</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="col two">
                    <label for="last">last name</label>
                    <input type="text" id="last" name="last-name">
                    <label for="phone">phone number</label>
                    <input type="tel" id="phone" name="email">
                    <label for="confirm-password">confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password">
                </div>
            </form>
            <div class="footer">
                <button>Create Account</button>
                <p>
                    Already have an account? <a href="">Log in</a>
                </p>
            </div>
        </div>
    </div>

</body>

</html>
